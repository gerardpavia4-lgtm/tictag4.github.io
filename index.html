<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cuenta confirmada</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f4f7;
    margin:0;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.card{
    background:white;
    padding:40px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
    max-width:400px;
}

h1{
    color:#2ecc71;
}

p{
    color:#555;
}

button{
    margin-top:20px;
    padding:12px 20px;
    border:none;
    background:#2ecc71;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#27ae60;
}
</style>

</head>

<body>

<div class="card">
    <h1>Compte confirmada</h1>
    <img style="width:100;" src="Logo_a.png" alt="logo">
    <p>La seva compte s'ha confirmat correctament</p>
    <p>Ja pots iniciar sessió a l'aplicació.</p>

    
</div>

</body>
</html>
